#
# Recommended origin layout for production:
# - Canonical public site: https://www.example.com
# - Apex domain: https://example.com -> 301 -> https://www.example.com
# - Optional CDN: place CDN only in front of www.example.com
# - Recommended origin protocol from CDN to ECS: HTTPS
#
# This file is included from nginx.conf inside the `http` block on Ubuntu,
# so `map` and `limit_req_zone` are valid here.
#

map $request_method $algowiki_write_limit_key {
    default "";
    POST $binary_remote_addr;
    PUT $binary_remote_addr;
    PATCH $binary_remote_addr;
    DELETE $binary_remote_addr;
}

limit_req_zone $binary_remote_addr zone=algowiki_auth:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=algowiki_register_challenge:10m rate=20r/m;
limit_req_zone $algowiki_write_limit_key zone=algowiki_write:10m rate=15r/m;

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    return 301 https://www.example.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.example.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.example.com;

    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;
    limit_req_status 429;

    # Auth endpoints get a tighter edge limit than the general API.
    location = /api/auth/login/ {
        limit_req zone=algowiki_auth burst=2 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location = /api/auth/register/ {
        limit_req zone=algowiki_auth burst=1 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location = /api/auth/register-challenge/ {
        limit_req zone=algowiki_register_challenge burst=5 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    # Ordinary user write endpoints are rate-limited at the edge.
    # GET/HEAD/OPTIONS are ignored because the limiting key is empty for read methods.
    location ~ ^/api/(comments|revisions|issues|tricks|questions|answers|competition-practice-proposals)(?:/.*)?$ {
        limit_req zone=algowiki_write burst=6 nodelay;

        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
    }
}
